{% load i18n %}
<section class="staff-msg-detail-section" aria-labelledby="staff-msg-detail-heading">
  <h2 id="staff-msg-detail-heading" class="staff-msg-section-title">{% trans "Thread & reply" %}</h2>
  <div id="staff-msg-detail-placeholder" class="staff-msg-quiet">
    {% trans "Select a message from the left to load the thread." %}
  </div>
  <div id="staff-msg-detail-panel" class="staff-msg-detail-panel" hidden>
    <div id="staff-msg-thread" class="staff-msg-thread"></div>
    <label class="staff-msg-label" for="staff-msg-reply-body">{% trans "Reply (SMS)" %}</label>
    <textarea id="staff-msg-reply-body" class="staff-msg-textarea" rows="3"></textarea>
    <button type="button" id="staff-msg-reply-send" class="staff-msg-button">{% trans "Send reply" %}</button>
    <p id="staff-msg-reply-status" class="staff-msg-status" role="status"></p>
  </div>
</section>
